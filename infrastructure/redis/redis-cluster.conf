# Redis Cluster Node Configuration
# Shared across all 6 cluster nodes; port/IP overridden via CLI flags.

cluster-enabled yes
cluster-config-file /data/nodes.conf
cluster-node-timeout 5000
cluster-announce-hostname ""

# Persistence
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no

# Snapshotting
save 900 1
save 300 10
save 60 10000
dbfilename dump.rdb
dir /data

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security
protected-mode no
# requirepass ""   # Uncomment and set REDIS_PASSWORD in .env for production

# Logging
loglevel notice
logfile ""

# Connection
tcp-keepalive 300
timeout 0
tcp-backlog 511
