name: Deploy — Production

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Docker image tag to deploy (semver, e.g. v3.0.1)"
        required: true

env:
  AWS_REGION: ap-south-1
  EKS_CLUSTER: hr-voice-agent-production
  NAMESPACE: hr-voice-agent
  HELM_RELEASE: hr-voice-agent

jobs:
  # ── Pre-deployment gate: require all security scans to have passed ──────────
  require-approvals:
    name: Required Checks & Approvals
    runs-on: ubuntu-latest
    environment:
      name: production   # Requires manual approval in GitHub Environments
    steps:
      - name: Confirm production release
        run: |
          echo "Production deployment approved for tag: ${{ github.ref_name }}"

  # ── Blue-Green Production Deploy ────────────────────────────────────────────
  deploy-production:
    name: Production Helm Deploy
    runs-on: ubuntu-latest
    needs: require-approvals
    environment:
      name: production
      url: https://api.yourdomain.com
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_PRODUCTION_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig for EKS Production
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ env.EKS_CLUSTER }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14"

      - name: Add Helm dependencies
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add hashicorp https://helm.releases.hashicorp.com
          helm repo add kedacore https://kedacore.github.io/charts
          helm repo update

      - name: Determine image tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.image_tag || github.ref_name }}"
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT

      # Snapshot current Helm revision for rollback reference
      - name: Capture current revision
        id: current
        run: |
          REV=$(helm history ${{ env.HELM_RELEASE }} \
            -n ${{ env.NAMESPACE }} \
            --max 1 \
            -o json | jq '.[0].revision' 2>/dev/null || echo "0")
          echo "revision=${REV}" >> $GITHUB_OUTPUT

      - name: Helm upgrade — Production
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} ./infrastructure/helm \
            --namespace ${{ env.NAMESPACE }} \
            --create-namespace \
            --values infrastructure/helm/values.yaml \
            --values infrastructure/helm/values-production.yaml \
            --set global.imageTag=${{ steps.tag.outputs.image_tag }} \
            --set global.environment=production \
            --timeout 15m \
            --wait \
            --atomic

      - name: Verify all deployments healthy
        run: |
          for svc in voice-service hr-service interview-service onboarding-service; do
            kubectl rollout status deployment/$svc \
              -n ${{ env.NAMESPACE }} \
              --timeout=10m
          done

      - name: Run production smoke tests
        run: |
          chmod +x scripts/smoke_test.sh
          ./scripts/smoke_test.sh https://api.yourdomain.com
        env:
          SMOKE_TEST_JWT: ${{ secrets.PRODUCTION_SMOKE_TEST_JWT }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          tag_name: ${{ github.ref_name }}

      - name: Notify Slack — success
        if: success()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚀 Production deployed: `${{ steps.tag.outputs.image_tag }}` by @${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}

      - name: Emergency rollback on failure
        if: failure()
        run: |
          echo "::error:: Production deployment failed! Rolling back to revision ${{ steps.current.outputs.revision }}..."
          helm rollback ${{ env.HELM_RELEASE }} ${{ steps.current.outputs.revision }} \
            --namespace ${{ env.NAMESPACE }} \
            --wait \
            --timeout 10m
          
      - name: Notify Slack — failure + rollback
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "🚨 PRODUCTION DEPLOY FAILED — Rolled back to revision ${{ steps.current.outputs.revision }}. Immediate action required!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_DEPLOY_WEBHOOK }}
