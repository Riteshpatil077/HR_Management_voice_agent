name: CI — Test, Lint, Build

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/hr-voice-agent

jobs:
  # ── Lint & Static Analysis ──────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: mypy type check (shared)
        run: mypy shared/ --strict --ignore-missing-imports

      - name: mypy type check (services)
        run: mypy services/ --strict --ignore-missing-imports

      - name: Bandit security scan
        run: bandit -r shared/ services/ -ll -x tests/

  # ── Unit Tests ──────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        service: [shared, voice_service, hr_service, interview_service, onboarding_service]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests — ${{ matrix.service }}
        run: |
          pytest tests/unit/${{ matrix.service }}/ \
            -v \
            --tb=short \
            --cov=${{ matrix.service }} \
            --cov-report=xml:coverage-${{ matrix.service }}.xml \
            --cov-fail-under=80
        env:
          APP_ENV: test

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage-${{ matrix.service }}.xml
          flags: ${{ matrix.service }}
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── Integration Tests ───────────────────────────────────────────────────────
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: hrvoice_test
          POSTGRES_USER: hrvoice
          POSTGRES_PASSWORD: testpass
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: --health-cmd "redis-cli ping" --health-interval 10s
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports: ["5672:5672"]
        options: --health-cmd "rabbitmq-diagnostics -q ping" --health-interval 15s
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run database migrations
        run: alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://hrvoice:testpass@localhost:5432/hrvoice_test

      - name: Run integration tests
        run: |
          pytest tests/integration/ \
            -v \
            --tb=short \
            -x \
            --timeout=60
        env:
          APP_ENV: test
          DATABASE_URL: postgresql+asyncpg://hrvoice:testpass@localhost:5432/hrvoice_test
          REDIS_URL: redis://localhost:6379/0
          AMQP_URL: amqp://guest:guest@localhost:5672/

  # ── Build & Push Container Images ───────────────────────────────────────────
  build-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: integration-tests
    if: github.event_name == 'push'
    strategy:
      matrix:
        service: [voice_service, hr_service, interview_service, onboarding_service]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=sha-
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_SHA=${{ github.sha }}
