name: Weekly LLM Cost Report

on:
  schedule:
    # Every Monday at 08:00 IST (02:30 UTC)
    - cron: "30 2 * * 1"
  workflow_dispatch:
    inputs:
      period_days:
        description: "Report period in days"
        required: false
        default: "7"

jobs:
  cost-report:
    name: Generate LLM Cost Report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_COST_REPORT_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Generate cost report
        run: |
          python scripts/cost_report.py \
            --period-days ${{ github.event.inputs.period_days || '7' }} \
            --output cost-report.json \
            --format json
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DB_READONLY_URL }}

      - name: Post cost report to Slack
        run: |
          python scripts/cost_report.py \
            --report-file cost-report.json \
            --post-to-slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_COST_REPORT_WEBHOOK }}

      - name: Upload cost report artifact
        uses: actions/upload-artifact@v4
        with:
          name: cost-report-${{ github.run_id }}
          path: cost-report.json
          retention-days: 90

      - name: Check budget thresholds
        run: |
          python scripts/cost_report.py \
            --report-file cost-report.json \
            --check-budget \
            --daily-limit 500 \
            --monthly-limit 10000
        continue-on-error: false
